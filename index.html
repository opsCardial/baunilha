<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unicornio de Baunilha - Servidor Minecraft</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --mc-green: #55FF55;
            --mc-shadow: #373737;
            --card-bg: rgba(0, 0, 0, 0.75);
            --mc-gold: #FFAA00;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'VT323', monospace;
            color: white;
            background-image: url('https://www.transparenttextures.com/patterns/minecraft-grass.png'), linear-gradient(to bottom, #5d823e, #5d823e);
            background-repeat: repeat;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 40px 0;
            text-align: center;
        }

        h1 {
            font-size: 4rem;
            text-shadow: 4px 4px 0px var(--mc-shadow);
            margin-bottom: 30px;
            color: var(--mc-green);
            letter-spacing: 2px;
        }

        .main-card {
            background-color: var(--card-bg);
            border: 4px solid #000;
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 10px 0 rgba(0,0,0,0.3);
        }

        /* Seção de Conexão */
        .connection-info {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 40px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 4px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .info-row:hover {
            border-color: var(--mc-green);
        }

        .label { color: var(--mc-gold); font-size: 1.5rem; }
        .value { font-size: 1.8rem; flex-grow: 1; }

        button {
            background-color: #A8A8A8;
            border: 3px solid #000;
            border-top-color: #D8D8D8;
            border-left-color: #D8D8D8;
            color: #373737;
            padding: 10px 20px;
            font-family: 'VT323', monospace;
            font-size: 1.2rem;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:hover {
            background-color: var(--mc-green);
            color: white;
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        .btn-direct {
            background-color: #5555FF;
            color: white;
            border-top-color: #7777FF;
            border-left-color: #7777FF;
            font-size: 1.8rem;
            padding: 15px 30px;
            width: 100%;
            margin-top: 10px;
        }

        /* Grid de Tutorial */
        h2 { font-size: 2.5rem; margin-top: 40px; color: var(--mc-gold); }

        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .step-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border: 2px solid #373737;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .step-card:hover {
            background: rgba(255,255,255,0.1);
            border-color: var(--mc-green);
        }

        .step-card img {
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
            margin-bottom: 10px;
        }

        .step-num { color: var(--mc-green); display: block; margin-bottom: 5px; }

        footer {
            margin-top: auto;
            padding: 20px;
            background: rgba(0,0,0,0.8);
            width: 100%;
            text-align: center;
            font-size: 1.2rem;
        }

        /* Responsividade */
        @media (max-width: 600px) {
            h1 { font-size: 2.5rem; }
            .info-row { flex-direction: column; gap: 10px; }
            .steps-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Unicornio de Baunilha</h1>

        <div class="main-card">
            <div class="connection-info">
                <div class="info-row">
                    <span class="label">IP:</span>
                    <span class="value" id="server-ip">147.185.221.31</span>
                    <button onclick="copyToClipboard('147.185.221.31', this)">Copiar IP</button>
                </div>

                <div class="info-row">
                    <span class="label">PORTA:</span>
                    <span class="value" id="server-port">51652</span>
                    <button onclick="copyToClipboard('51652', this)">Copiar Porta</button>
                </div>

                <a href="minecraft://?addExternalServer=Unicornio%20de%20Baunilha|147.185.221.31:51652">
                    <button class="btn-direct">ENTRAR DIRETO (BEDROCK)</button>
                </a>
            </div>

            <hr style="border: 1px solid #373737; margin: 40px 0;">

            <h2>Como Entrar (Bedrock)</h2>
            <div class="steps-grid">
                <div class="step-card">
                    <img src="https://minecraft.wiki/images/Crafting_Table_JE4_BE3.png" alt="Icon">
                    <span><b class="step-num">1.</b> Abra o jogo</span>
                </div>
                <div class="step-card">
                    <img src="https://minecraft.wiki/images/Diamond_Sword_JE3_BE3.png" alt="Icon">
                    <span><b class="step-num">2.</b> Jogar</span>
                </div>
                <div class="step-card">
                    <img src="https://minecraft.wiki/images/Compass_JE3_BE3.gif" alt="Icon">
                    <span><b class="step-num">3.</b> Servidores</span>
                </div>
                <div class="step-card">
                    <img src="https://minecraft.wiki/images/Oak_Sign_JE2_BE2.png" alt="Icon">
                    <span><b class="step-num">4.</b> Adicionar</span>
                </div>
                <div class="step-card">
                    <img src="https://minecraft.wiki/images/Name_Tag_JE2_BE2.png" alt="Icon">
                    <span><b class="step-num">5.</b> Nome: Baunilha</span>
                </div>
                <div class="step-card">
                    <img src="https://minecraft.wiki/images/Map_Filled_JE2_BE2.png" alt="Icon">
                    <span><b class="step-num">6.</b> Digite o IP</span>
                </div>
                <div class="step-card">
                    <img src="https://minecraft.wiki/images/Iron_Door_JE2_BE2.png" alt="Icon">
                    <span><b class="step-num">7.</b> Digite a Porta</span>
                </div>
                <div class="step-card">
                    <img src="https://minecraft.wiki/images/Ender_Pearl_JE3_BE2.png" alt="Icon">
                    <span><b class="step-num">8.</b> Jogar</span>
                </div>
            </div>
        </div>
    </div>

    <footer>
        Desenvolvido por: <b>opsCardial</b> | 2026
    </footer>

    <script>
        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.innerText;
                btn.innerText = "Copiado!";
                btn.style.backgroundColor = "#55FF55";
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.backgroundColor = "";
                }, 2000);
            });
        }
    </script>
</body>
</html>
