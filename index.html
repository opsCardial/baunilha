<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Unicornio de Baunilha</title>

<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Minecraft', sans-serif;
  color: white;
  text-align: center;
  background-image: url('https://i.imgur.com/3e5pQ7M.png');
  background-size: 150px;
}

.container {
  padding: 40px 20px;
}

h1 {
  font-size: 48px;
  text-shadow: 3px 3px #000;
}

.card {
  background: rgba(0,0,0,0.75);
  border: 3px solid #555;
  border-radius: 12px;
  padding: 20px;
  max-width: 800px;
  margin: 20px auto;
  box-shadow: 0 0 15px #000;
}

.ip {
  font-size: 18px;
  margin: 8px 0;
  background: #222;
  padding: 8px;
  border-radius: 6px;
}

button {
  margin-top: 8px;
  padding: 10px 20px;
  font-family: 'Minecraft', sans-serif;
  background: #4CAF50;
  border: none;
  color: white;
  font-size: 14px;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #45a049;
  transform: scale(1.05);
}

.steps {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin-top: 20px;
}

.step {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  border: 2px solid #444;
}

.icon img {
  width: 40px;
  height: 40px;
  image-rendering: pixelated;
  margin-bottom: 5px;
}

.footer {
  margin-top: 30px;
  opacity: 0.8;
}
</style>
</head>

<body>
<div class="container">

<h1>🦄 Unicornio de Baunilha</h1>

<div class="card">
  <h2>🌐 Conexao</h2>

  <div>
    <div><strong>IP</strong></div>
    <div class="ip" id="ip">147.185.221.31</div>
    <button onclick="copyText('ip')">Copiar IP</button>
  </div>

  <div style="margin-top: 15px;">
    <div><strong>Porta</strong></div>
    <div class="ip" id="porta">51652</div>
    <button onclick="copyText('porta')">Copiar Porta</button>
  </div>

  <a href="minecraft://?addExternalServer=Unicornio%20de%20Baunilha|147.185.221.31:51652">
    <button style="background:#2196F3; margin-top:15px;">
      🎮 Entrar direto
    </button>
  </a>
</div>

<div class="card">
  <h2>⚔️ Como Entrar (Bedrock)</h2>

  <div class="steps">

    <div class="step">
      <div class="icon">
        <img src="https://mc-icons.netlify.app/grass_block.png">
      </div>
      Abra o Minecraft
    </div>

    <div class="step">
      <div class="icon">
        <img src="https://mc-icons.netlify.app/emerald.png">
      </div>
      Jogar
    </div>

    <div class="step">
      <div class="icon">
        <img src="https://mc-icons.netlify.app/ender_eye.png">
      </div>
      Servidores
    </div>

    <div class="step">
      <div class="icon">
        <img src="https://mc-icons.netlify.app/command_block.png">
      </div>
      Adicionar
    </div>

    <div class="step">
      <div class="icon">
        <img src="https://mc-icons.netlify.app/name_tag.png">
      </div>
      Nome
    </div>

    <div class="step">
      <div class="icon">
        <img src="https://mc-icons.netlify.app/compass.png">
      </div>
      IP
    </div>

    <div class="step">
      <div class="icon">
        <img src="https://mc-icons.netlify.app/redstone_torch.png">
      </div>
      Porta
    </div>

    <div class="step">
      <div class="icon">
        <img src="https://mc-icons.netlify.app/diamond_sword.png">
      </div>
      Jogar
    </div>

  </div>
</div>

<div class="footer">
  Criado por <strong>opsCardial</strong>
</div>

</div>

<script>
function copyText(id) {
  const text = document.getElementById(id).innerText;
  navigator.clipboard.writeText(text);
  alert("Copiado!");
}
</script>

</body>
</html>
