<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Unicórnio de Baunilha</title>

<link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Minecraft', sans-serif;
  color: white;
  text-align: center;

  /* textura estilo grama */
  background-image: url('https://i.imgur.com/3e5pQ7M.png');
  background-size: 150px;
}

.container {
  padding: 40px 20px;
}

h1 {
  font-size: 48px;
  text-shadow: 3px 3px #000;
}

.card {
  background: rgba(0,0,0,0.75);
  border: 3px solid #555;
  border-radius: 12px;
  padding: 20px;
  max-width: 800px;
  margin: 20px auto;
  box-shadow: 0 0 15px #000;
}

.ip {
  font-size: 20px;
  margin: 10px 0;
  background: #222;
  padding: 10px;
  border-radius: 6px;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  font-family: 'Minecraft', sans-serif;
  background: #4CAF50;
  border: none;
  color: white;
  font-size: 16px;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #45a049;
  transform: scale(1.05);
}

.steps {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 10px;
  margin-top: 20px;
}

.step {
  background: #222;
  padding: 10px;
  border-radius: 8px;
  border: 2px solid #444;
}

.icon {
  font-size: 30px;
  margin-bottom: 5px;
}

.footer {
  margin-top: 30px;
  opacity: 0.8;
}
</style>
</head>

<body>
<div class="container">

<h1>🦄 Unicórnio de Baunilha</h1>

<div class="card">
  <h2>🌐 Conexão</h2>

  <div class="ip" id="ip">147.185.221.31:51652</div>
  <button onclick="copyIP()">Copiar IP</button>
</div>

<div class="card">
  <h2>⚔️ Como Entrar (Bedrock)</h2>

  <div class="steps">

    <div class="step">
      <div class="icon">🟩</div>
      Abra o Minecraft
    </div>

    <div class="step">
      <div class="icon">▶️</div>
      Toque em Jogar
    </div>

    <div class="step">
      <div class="icon">📡</div>
      Aba Servidores
    </div>

    <div class="step">
      <div class="icon">➕</div>
      Adicionar Servidor
    </div>

    <div class="step">
      <div class="icon">🪪</div>
      Nome: Unicórnio
    </div>

    <div class="step">
      <div class="icon">🌍</div>
      IP: 147.185.221.31
    </div>

    <div class="step">
      <div class="icon">🔴</div>
      Porta: 51652
    </div>

    <div class="step">
      <div class="icon">⚔️</div>
      Entrar e jogar
    </div>

  </div>
</div>

<div class="footer">
  Criado por <strong>opsCardial</strong>
</div>

</div>

<script>
function copyIP() {
  const ip = document.getElementById("ip").innerText;
  navigator.clipboard.writeText(ip);
  alert("IP copiado!");
}
</script>

</body>
</html>
